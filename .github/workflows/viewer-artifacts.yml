name: Viewer Artifacts

on:
  push:
    tags:
      - "viewer/tui/v*"
      - "viewer/web/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Viewer release tag to build, for example viewer/web/v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: startsWith(inputs.tag || github.ref_name, 'viewer/tui/') || startsWith(inputs.tag || github.ref_name, 'viewer/web/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Select viewer
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            viewer/tui/v*)
              echo "VIEWER=tui" >> "$GITHUB_ENV"
              echo "MODULE_DIR=viewer/tui" >> "$GITHUB_ENV"
              echo "BINARY=sap-viewer-tui" >> "$GITHUB_ENV"
              ;;
            viewer/web/v*)
              echo "VIEWER=web" >> "$GITHUB_ENV"
              echo "MODULE_DIR=viewer/web" >> "$GITHUB_ENV"
              echo "BINARY=sap-viewer-web" >> "$GITHUB_ENV"
              ;;
            *)
              echo "unsupported tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "VERSION=${RELEASE_TAG##*/}" >> "$GITHUB_ENV"

      - name: Build archive
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          artifact="${BINARY}_${VERSION}_${GOOS}_${GOARCH}"
          go build -C "$MODULE_DIR" -o "../../dist/${artifact}/${BINARY}${ext}" .
          tar -C "dist/${artifact}" -czf "dist/${artifact}.tar.gz" "${BINARY}${ext}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY }}-${{ env.VERSION }}-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/*.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > "${RELEASE_TAG##*/}_checksums.txt"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" dist/*.tar.gz dist/*_checksums.txt --repo "$GITHUB_REPOSITORY" --clobber
