name: GoReleaser

on:
  push:
    tags:
      - "viewer/tui/v*"
      - "viewer/web/v*"

permissions:
  contents: write

jobs:
  tui:
    if: startsWith(github.ref_name, 'viewer/tui/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.tui.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  web:
    if: startsWith(github.ref_name, 'viewer/web/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.web.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
